<!DOCTYPE html>
  <html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abmelden - VANSOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:#f5f0e8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
        .card{background:#fff;max-width:480px;width:100%;padding:60px 48px;text-align:center;}
        .logo{width:80px;margin:0 auto 36px;display:block;}
    .eyebrow{font-size:10px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:#787d78;margin-bottom:16px;}
    h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:400;color:#2C2C2C;line-height:1.3;margin-bottom:16px;}
    p{font-size:14px;line-height:1.8;color:#777;margin-bottom:32px;}
    .divider{height:1px;background:#e6ddd3;margin:32px 0;}
        .btn{display:inline-block;padding:14px 40px;background:#787d78;color:#fff;text-decoration:none;font-size:11px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;border:none;font-family:'Inter',sans-serif;cursor:pointer;}
        .btn-outline{display:inline-block;padding:14px 40px;background:transparent;color:#787d78;text-decoration:none;font-size:11px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;border:1px solid #787d78;font-family:'Inter',sans-serif;margin-top:12px;cursor:pointer;}
    .back{font-size:12px;color:#aaa;margin-top:28px;text-decoration:none;display:block;}
        .icon{font-size:40px;margin-bottom:20px;}
  </style>
    </head>
    <body>
    <div class="card">
      <img src="https://qtegcxhlcydjrondrzbr.supabase.co/storage/v1/object/public/vansol-media/logos/VANSOL%20Logo%20Dark.png" alt="VANSOL" class="logo" />
      <p class="eyebrow">Newsletter</p>
      <div id="content"><p style="color:#aaa;">Einen Moment...</p></div>
    </div>
    <script>
    (async()=>{
      const email=new URLSearchParams(window.location.search).get('email')||'';
  const el=document.getElementById('content');
  if(!email){el.innerHTML='<div class="icon">&#9888;</div><h1>Kein Link gefunden</h1><p>Bitte nutze den Abmelde-Link aus einer unserer E-Mails.</p><a href="https://www.vansol.de" class="btn-outline">Zur Website</a>';return;}
  try{await fetch('https://qtegcxhlcydjrondrzbr.supabase.co/functions/v1/newsletter-unsubscribe?email='+encodeURIComponent(email));}catch(e){}
  el.innerHTML='<div class="icon">&#129132;</div><h1>Du wurdest erfolgreich abgemeldet.</h1><p>Wir haben <strong>'+email+'</strong> aus unserem Newsletter entfernt. Du erh&auml;ltst keine weiteren E-Mails von VANSOL.<br><br>Wir w&uuml;nschen dir alles Liebe auf deinem Weg. &#129132;</p><div class="divider"></div><p style="font-size:13px;color:#555;margin-bottom:16px;">Du m&ouml;chtest doch dabei bleiben?</p><a href="https://vans-ol-newsletter-git-main-tschapinskis-projects.vercel.app/?resubscribe='+encodeURIComponent(email)+'" class="btn">Wieder anmelden</a><div style="margin-top:16px;"><a href="https://www.vansol.de" class="btn-outline">Zur Website</a></div><a href="https://www.vansol.de" class="back">www.vansol.de</a>';
})();
</script>
</body>
</html>
